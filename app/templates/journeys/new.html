{% extends "base.html" %}
{% block title %}Nueva jornada{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Nueva jornada</h1>
  <form action="/journeys" method="post" class="stack">
    <label>Fecha <input type="date" name="journey_date" required></label>
    <label>Sede
      <select name="venue" required>
        {% for venue, theme in venues.items() %}
          <option value="{{ venue }}">{{ venue }} · {{ theme }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit">Crear jornada</button>
  </form>
</section>
{% endblock %}
